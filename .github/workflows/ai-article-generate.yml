# =============================================================================
# ai-article-generate.yml
# -----------------------------------------------------------------------------
# PURPOSE
#   Manual, single-topic entry point. It generates a Spanish blog-post DRAFT
#   (text + AI cover + AI/source body images) with Azure AI Foundry, validates it
#   with a Hugo build and (optionally) opens a human-reviewed Pull Request.
#
#   The actual build pipeline lives in the REUSABLE workflow
#   `ai-article-build.yml`; this file only exposes the manual `workflow_dispatch`
#   surface (topic + dry_run) and delegates to it. The scheduled discovery flow
#   (`ai-article-weekly.yml`) calls the very same reusable workflow.
#
# SECURITY (OWASP A03 Injection hardening)
#   * All hardening lives in `ai-article-build.yml`: `topic` is passed via env
#     (never interpolated into a shell `run:` line); every data-plane bearer token
#     is acquired and consumed inside a single step and never crosses a boundary.
#   * Only the GitHub App private key is a secret (forwarded via `secrets: inherit`);
#     all Azure/App IDs are public identifiers, mirroring ai-article-auth-check.yml.
# =============================================================================

name: ai-article-generate

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Tema del artículo a generar (en español)."
        type: string
        required: true
      dry_run:
        description: "true: genera y valida, sube el .md como artefacto y NO abre PR. false: abre el PR. Es false por defecto."
        type: boolean
        required: false
        default: false

# Least privilege for the whole job:
#   id-token:write     -> mint the OIDC token for azure/login (no Azure secrets)
#   contents:write     -> create the branch / commit the post (PR path only)
#   pull-requests:write-> open the PR (PR path only)
permissions:
  id-token: write
  contents: write
  pull-requests: write

# Avoid two concurrent generations racing on the working tree / branches.
concurrency:
  group: ai-article-generate
  cancel-in-progress: false

# The whole build lives in the reusable workflow `ai-article-build.yml`. This
# manual entry point only forwards the dispatch inputs to it. `secrets: inherit`
# passes APP_PRIVATE_KEY (and any other secrets) through; repository `vars` are
# read directly inside the reusable workflow, so no `env:` block is needed here.
jobs:
  generate:
    name: Generar borrador y (opcional) abrir PR
    uses: ./.github/workflows/ai-article-build.yml
    with:
      topic: ${{ inputs.topic }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit
