# =============================================================================
# ai-article-weekly.yml  (SCHEDULED DISCOVERY -> FAN-OUT)
# -----------------------------------------------------------------------------
# PURPOSE
#   Once a week, autonomously DISCOVER fresh, on-topic candidates with Tavily +
#   Azure AI Foundry, pick the top-N, and open ONE human-reviewed Pull Request
#   per article by fanning out to the reusable `ai-article-build.yml` workflow.
#
#   Flow:
#     Job A (discover): OIDC -> token (1 step) -> discover_topics.py
#                       (writes automation/topics/<id>.yaml + final JSON matrix).
#     Job B (write):    matrix fan-out (1 per article, serialised) -> each entry
#                       calls ai-article-build.yml with one complete candidate
#                       payload -> one PR per article.
#
# SECURITY (OWASP A03 Injection hardening — same guarantees as ai-article-build)
#   * The data-plane bearer token is acquired AND consumed inside the SINGLE
#     discovery step; it never crosses a step boundary or reaches logs/outputs.
#   * `TAVILY_API_KEY` is referenced ONLY in the discovery step's env, never
#     echoed, and lives only as a GitHub Actions Secret.
#   * The complete candidate YAML travels as base64 and is decoded to a file
#     inside the reusable workflow. Web-derived values are never interpolated
#     into a shell `run:` line.
#
# OPEN-PR DEDUP
#   Before discovery, ledger files from open AI PRs are overlaid on the checkout.
#   This keeps in-review topics visible to dedup even before they reach `main`.
# =============================================================================

name: ai-article-weekly

on:
  # Lunes 06:00 UTC. Cambia la cadencia aquí si hace falta.
  schedule:
    - cron: "0 6 * * 1"
  # Disparo manual. dry_run=false por defecto: descubre, abre PRs y escribe
  # el ledger. Usa dry_run=true sólo para previsualizar candidatos.
  workflow_dispatch:
    inputs:
      focus:
        description: "Enfoque temático opcional para guiar el descubrimiento."
        type: string
        required: false
        default: ""
      dry_run:
        description: "true: sólo previsualiza el descubrimiento (sin PRs). false: descubre y abre PRs."
        type: boolean
        required: false
        default: false

# Least privilege for the whole workflow:
#   id-token:write      -> mint the OIDC token for azure/login (no Azure secrets)
#   contents:write      -> create branches / commit posts (PR path, job B)
#   pull-requests:write -> open the PRs (job B)
permissions:
  id-token: write
  contents: write
  pull-requests: write

# Avoid overlapping weekly runs racing on the working tree / branches / labels.
concurrency:
  group: ai-article-weekly
  cancel-in-progress: false

# Public, non-secret identifiers loaded from repository Variables.
env:
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AOAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
  AOAI_TEXT_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT_TEXT }}
  # Embeddings deployment for semantic dedup (repo var; e.g. text-embedding-3-large).
  AZURE_OPENAI_DEPLOYMENT_EMBEDDINGS: ${{ vars.AZURE_OPENAI_DEPLOYMENT_EMBEDDINGS }}
  # Confirmed working token audience for both Azure OpenAI and MAI surfaces.
  TOKEN_SCOPE: https://cognitiveservices.azure.com
  # How many of the ranked candidates to turn into articles each run. Tunable via
  # the optional repository variable MAX_ARTICLES_PER_RUN (defaults to 3).
  MAX_ARTICLES_PER_RUN: ${{ vars.MAX_ARTICLES_PER_RUN || '3' }}

jobs:
  # ---------------------------------------------------------------------------
  # Job A — discover candidates and build the article matrix.
  # ---------------------------------------------------------------------------
  discover:
    name: Descubrir temas y construir la matriz
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC, sin secretos)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del script
        run: python -m pip install --disable-pip-version-check --no-input -r automation/scripts/requirements.txt

      - name: Incorporar ledger de Pull Requests de IA abiertos
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          declare -A loaded_topics=()
          while IFS=$'\t' read -r pr_number branch; do
            [ -z "${pr_number}" ] && continue
            git check-ref-format --branch "${branch}" > /dev/null
            git fetch --quiet --no-tags origin "refs/heads/${branch}"
            while IFS= read -r topic_path; do
              [ -z "${topic_path}" ] && continue
              if [[ "${topic_path}" =~ ^automation/topics/[a-z0-9]+(-[a-z0-9]+)*\.ya?ml$ ]]; then
                if [ -n "${loaded_topics[${topic_path}]:-}" ]; then
                  echo "::error::Topic ledger ${topic_path} is modified by open PRs #${loaded_topics[${topic_path}]} and #${pr_number}."
                  exit 1
                fi
                git show "FETCH_HEAD:${topic_path}" > "${topic_path}"
                loaded_topics["${topic_path}"]="${pr_number}"
                echo "Loaded ledger entry from open PR #${pr_number}: ${topic_path}"
              fi
            done < <(
              gh api --paginate \
                "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}/files" \
                --jq '.[] | select(.status != "removed") | .filename'
            )
          done < <(
            gh pr list --state open --label ai-generated --limit 1000 \
              --json number,headRefName,isCrossRepository \
              --jq '.[] | select(.isCrossRepository == false) | [.number, .headRefName] | @tsv'
          )

      # ---------------------------------------------------------------------
      # Acquire the data-plane token AND run discovery in ONE step. The Tavily
      # key lives only in this step's env. On a manual dry-run the script is
      # invoked with --dry-run: it previews candidates WITHOUT writing the ledger
      # or any step outputs, so the matrix ends up empty and job B is skipped.
      # ---------------------------------------------------------------------
      - name: Descubrir temas (Tavily + Foundry, token en un solo paso)
        id: discover
        shell: bash
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DISCOVERY_FOCUS: ${{ inputs.focus }}
          DISCOVERY_TRACE_STDOUT: "true"
          DISCOVERY_DEBUG_FILE: ${{ runner.temp }}/discovery-debug.json
          REQUIRE_EMBEDDINGS: "true"
          MAX_CANDIDATES: ${{ env.MAX_ARTICLES_PER_RUN }}
          # schedule -> false (real run); manual -> follows the dry_run input.
          WEEKLY_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          TOKEN="$(az account get-access-token --resource "${TOKEN_SCOPE}" --query accessToken --output tsv --only-show-errors)"
          if [ "${WEEKLY_DRY_RUN}" = "true" ]; then
            echo "Dry-run: previsualización del descubrimiento (sin ledger ni candidatos)."
            AOAI_TOKEN="${TOKEN}" python automation/scripts/discover_topics.py --dry-run
          else
            AOAI_TOKEN="${TOKEN}" python automation/scripts/discover_topics.py
          fi

      - name: Subir traza de descubrimiento
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: discovery-trace-${{ github.run_id }}
          path: ${{ runner.temp }}/discovery-debug.json
          if-no-files-found: warn
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job B — one article (and one PR) per selected candidate. Serialised
  # (max-parallel: 1) to avoid races on branches/labels; fail-fast disabled so a
  # single bad candidate does not cancel the rest.
  # ---------------------------------------------------------------------------
  write:
    name: Generar artículo y abrir PR
    needs: discover
    if: ${{ fromJSON(needs.discover.outputs.count || '0') > 0 }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/ai-article-build.yml
    with:
      candidate_b64: ${{ matrix.candidate_b64 }}
      dry_run: false
      pr_extra_label: needs-rai-review
    secrets: inherit
