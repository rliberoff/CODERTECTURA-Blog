# =============================================================================
# ai-article-weekly.yml  (SCHEDULED DISCOVERY -> FAN-OUT)
# -----------------------------------------------------------------------------
# PURPOSE
#   Once a week, autonomously DISCOVER fresh, on-topic candidates with Tavily +
#   Azure AI Foundry, pick the top-N, and open ONE human-reviewed Pull Request
#   per article by fanning out to the reusable `ai-article-build.yml` workflow.
#
#   Flow:
#     Job A (discover): OIDC -> token (1 step) -> discover_topics.py
#                       (writes automation/topics/<id>.yaml + candidate_ids)
#                       -> build a JSON matrix of the top-N candidates.
#     Job B (write):    matrix fan-out (1 per article, serialised) -> each entry
#                       calls ai-article-build.yml with the candidate's topic +
#                       base64 sources -> one PR per article (needs-rai-review).
#
# SECURITY (OWASP A03 Injection hardening — same guarantees as ai-article-build)
#   * The data-plane bearer token is acquired AND consumed inside the SINGLE
#     discovery step; it never crosses a step boundary or reaches logs/outputs.
#   * `TAVILY_API_KEY` is referenced ONLY in the discovery step's env, never
#     echoed, and lives only as a GitHub Actions Secret.
#   * Candidate titles, slugs, notes and sources (untrusted web-derived data) are
#     NEVER interpolated into a shell `run:` line. The matrix is built by an
#     inline Python reading env vars; candidate ids reach Python via the
#     CANDIDATE_IDS env var; sources travel as base64 and are decoded to a file
#     inside the reusable workflow.
#
# OPERATIONAL ASSUMPTION (dedup) — Natasha P2-4
#   Merge or close the week's AI PRs before the next Monday run — the candidate
#   ledger files are written in the runner and NOT committed, so an open-but-
#   unmerged draft is not visible to next week's dedup (which reads merged posts
#   on `main`). With the <=3/run cap this is easily managed. A fuller open-PR-aware
#   dedup is a deferred design decision and is intentionally NOT implemented here;
#   the same reminder is surfaced on each PR's review checklist.
# =============================================================================

name: ai-article-weekly

on:
  # Lunes 06:00 UTC. Cambia la cadencia aquí si hace falta.
  schedule:
    - cron: "0 6 * * 1"
  # Disparo manual. dry_run=false por defecto: descubre, abre PRs y escribe
  # el ledger. Usa dry_run=true sólo para previsualizar candidatos.
  workflow_dispatch:
    inputs:
      focus:
        description: "Enfoque temático opcional para guiar el descubrimiento."
        type: string
        required: false
        default: ""
      dry_run:
        description: "true: sólo previsualiza el descubrimiento (sin PRs). false: descubre y abre PRs."
        type: boolean
        required: false
        default: false

# Least privilege for the whole workflow:
#   id-token:write      -> mint the OIDC token for azure/login (no Azure secrets)
#   contents:write      -> create branches / commit posts (PR path, job B)
#   pull-requests:write -> open the PRs (job B)
permissions:
  id-token: write
  contents: write
  pull-requests: write

# Avoid overlapping weekly runs racing on the working tree / branches / labels.
concurrency:
  group: ai-article-weekly
  cancel-in-progress: false

# Public, non-secret identifiers loaded from repository Variables.
env:
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AOAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
  AOAI_TEXT_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT_TEXT }}
  # Embeddings deployment for semantic dedup (repo var; e.g. text-embedding-3-large).
  AZURE_OPENAI_DEPLOYMENT_EMBEDDINGS: ${{ vars.AZURE_OPENAI_DEPLOYMENT_EMBEDDINGS }}
  # Confirmed working token audience for both Azure OpenAI and MAI surfaces.
  TOKEN_SCOPE: https://cognitiveservices.azure.com
  # How many of the ranked candidates to turn into articles each run. Tunable via
  # the optional repository variable MAX_ARTICLES_PER_RUN (defaults to 3).
  MAX_ARTICLES_PER_RUN: ${{ vars.MAX_ARTICLES_PER_RUN || '3' }}

jobs:
  # ---------------------------------------------------------------------------
  # Job A — discover candidates and build the article matrix.
  # ---------------------------------------------------------------------------
  discover:
    name: Descubrir temas y construir la matriz
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC, sin secretos)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del script
        run: python -m pip install --disable-pip-version-check --no-input -r automation/scripts/requirements.txt

      # ---------------------------------------------------------------------
      # Acquire the data-plane token AND run discovery in ONE step. The Tavily
      # key lives only in this step's env. On a manual dry-run the script is
      # invoked with --dry-run: it previews candidates WITHOUT writing the ledger
      # or any step outputs, so the matrix ends up empty and job B is skipped.
      # ---------------------------------------------------------------------
      - name: Descubrir temas (Tavily + Foundry, token en un solo paso)
        id: discover
        shell: bash
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          DISCOVERY_FOCUS: ${{ inputs.focus }}
          # schedule -> false (real run); manual -> follows the dry_run input.
          WEEKLY_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          TOKEN="$(az account get-access-token --resource "${TOKEN_SCOPE}" --query accessToken --output tsv --only-show-errors)"
          if [ "${WEEKLY_DRY_RUN}" = "true" ]; then
            echo "Dry-run: previsualización del descubrimiento (sin ledger ni candidatos)."
            AOAI_TOKEN="${TOKEN}" python automation/scripts/discover_topics.py --dry-run
          else
            AOAI_TOKEN="${TOKEN}" python automation/scripts/discover_topics.py
          fi

      # ---------------------------------------------------------------------
      # Build the fan-out matrix from the top-N candidate ledger files. The
      # candidate ids arrive via CANDIDATE_IDS (env, never interpolated into the
      # command). The inline Python (quoted heredoc -> no shell/Actions
      # expansion) loads each automation/topics/<id>.yaml with PyYAML and emits
      # { include: [{ id, topic, sources_file_b64 }] } plus a count, where
      # sources_file_b64 is base64 of the candidate's `sources` array.
      # ---------------------------------------------------------------------
      - name: Seleccionar top-N y construir la matriz de artículos
        id: matrix
        shell: bash
        env:
          CANDIDATE_IDS: ${{ steps.discover.outputs.candidate_ids }}
          TOPICS_DIR: automation/topics
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os

          import yaml

          ids = [i.strip() for i in os.environ.get("CANDIDATE_IDS", "").split(",") if i.strip()]
          try:
              cap = int(os.environ.get("MAX_ARTICLES_PER_RUN", "3"))
          except ValueError:
              cap = 3
          cap = max(cap, 0)
          topics_dir = os.environ.get("TOPICS_DIR", "automation/topics").rstrip("/")

          include = []
          for cid in ids[:cap]:
              path = os.path.join(topics_dir, f"{cid}.yaml")
              try:
                  with open(path, "r", encoding="utf-8") as handle:
                      doc = yaml.safe_load(handle)
              except OSError as exc:
                  print(f"::warning::skipping {cid}: cannot read {path}: {exc}")
                  continue
              if not isinstance(doc, dict):
                  print(f"::warning::skipping {cid}: topic file is not a mapping")
                  continue
              title = doc.get("title")
              if not isinstance(title, str) or not title.strip():
                  print(f"::warning::skipping {cid}: no usable title")
                  continue
              title = title.strip()
              notes = doc.get("notes")
              angle = notes.strip()[:200].strip() if isinstance(notes, str) else ""
              topic = f"{title}. Enfoque: {angle}" if angle else title
              sources = doc.get("sources")
              if not isinstance(sources, list):
                  sources = []
              sources_b64 = base64.b64encode(
                  json.dumps(sources, ensure_ascii=False).encode("utf-8")
              ).decode("ascii")
              include.append({"id": cid, "topic": topic, "sources_file_b64": sources_b64})

          matrix = {"include": include}
          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a", encoding="utf-8") as handle:
                  handle.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
                  handle.write(f"count={len(include)}\n")
          print(f"Seleccionados {len(include)} candidato(s) para generación (cap={cap}).")
          PY

  # ---------------------------------------------------------------------------
  # Job B — one article (and one PR) per selected candidate. Serialised
  # (max-parallel: 1) to avoid races on branches/labels; fail-fast disabled so a
  # single bad candidate does not cancel the rest.
  # ---------------------------------------------------------------------------
  write:
    name: Generar artículo y abrir PR
    needs: discover
    if: ${{ fromJSON(needs.discover.outputs.count || '0') > 0 }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/ai-article-build.yml
    with:
      topic: ${{ matrix.topic }}
      sources_file_b64: ${{ matrix.sources_file_b64 }}
      dry_run: false
      pr_extra_label: needs-rai-review
    secrets: inherit
