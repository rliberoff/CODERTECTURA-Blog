name: Auto Publish After Codeowner Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: read

jobs:
  mark-reviewed-posts:
    if: >-
      github.event.review.state == 'approved' &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Validate reviewer is listed in CODEOWNERS
        id: reviewer
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reviewer = context.payload.review.user.login.toLowerCase();
            const baseRef = context.payload.pull_request.base.ref;

            let content;
            try {
              const response = await github.rest.repos.getContent({
                owner,
                repo,
                path: '.github/CODEOWNERS',
                ref: baseRef,
              });
              content = Buffer.from(response.data.content, 'base64').toString('utf8');
            } catch (error) {
              core.setFailed(`Cannot read .github/CODEOWNERS from ${baseRef}: ${error.message}`);
              return;
            }

            const owners = new Set();
            for (const rawLine of content.split(/\r?\n/)) {
              const line = rawLine.trim();
              if (!line || line.startsWith('#')) {
                continue;
              }
              const tokens = line.split(/\s+/).slice(1);
              for (const token of tokens) {
                if (token.startsWith('@')) {
                  owners.add(token.slice(1).toLowerCase());
                }
              }
            }

            const isCodeOwner = owners.has(reviewer);
            core.info(`Reviewer: ${reviewer}`);
            core.info(`Known CODEOWNERS identities: ${Array.from(owners).join(', ')}`);
            core.setOutput('is_codeowner', isCodeOwner ? 'true' : 'false');

      - name: Collect post files changed in PR
        if: steps.reviewer.outputs.is_codeowner == 'true'
        id: targets
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const postFiles = files
              .map((f) => f.filename)
              .filter((name) => name.startsWith('content/posts/') && name.endsWith('.md'));

            core.info(`Detected post files: ${postFiles.join(', ') || 'none'}`);
            core.setOutput('count', String(postFiles.length));
            core.setOutput('files', postFiles.join('\n'));

      - name: Checkout PR branch
        if: >-
          steps.reviewer.outputs.is_codeowner == 'true' &&
          steps.targets.outputs.count != '0'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Python
        if: >-
          steps.reviewer.outputs.is_codeowner == 'true' &&
          steps.targets.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        if: >-
          steps.reviewer.outputs.is_codeowner == 'true' &&
          steps.targets.outputs.count != '0'
        run: python -m pip install --disable-pip-version-check --no-input pyyaml

      - name: Update front matter status
        if: >-
          steps.reviewer.outputs.is_codeowner == 'true' &&
          steps.targets.outputs.count != '0'
        env:
          TARGET_FILES: ${{ steps.targets.outputs.files }}
          REVIEWER: ${{ github.event.review.user.login }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import datetime
          import os
          import re
          from pathlib import Path

          import yaml

          files_env = os.environ.get("TARGET_FILES", "").strip()
          reviewer = os.environ.get("REVIEWER", "").strip()
          paths = [Path(p) for p in files_env.splitlines() if p.strip()]

          if not paths:
              print("No target files to update.")
              raise SystemExit(0)

          reviewed_at = datetime.datetime.now(datetime.timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          updated_count = 0

          for path in paths:
              raw = path.read_text(encoding="utf-8")
              match = re.match(r"^---\n(.*?)\n---\n", raw, re.DOTALL)
              if not match:
                  print(f"Skipping {path}: no YAML front matter")
                  continue

              fm_raw = match.group(1)
              body = raw[match.end():]
              data = yaml.safe_load(fm_raw) or {}
              changed = False

              if data.get("draft") is True:
                  data["draft"] = False
                  changed = True

              ai = data.get("ai")
              if not isinstance(ai, dict):
                  ai = {}
                  data["ai"] = ai
                  changed = True

              if ai.get("review_status") != "approved":
                  ai["review_status"] = "approved"
                  changed = True

              if reviewer and ai.get("reviewed_by") != reviewer:
                  ai["reviewed_by"] = reviewer
                  changed = True

              if ai.get("reviewed_at") != reviewed_at:
                  ai["reviewed_at"] = reviewed_at
                  changed = True

              if not changed:
                  print(f"No changes needed in {path}")
                  continue

              new_fm = yaml.safe_dump(
                  data,
                  sort_keys=False,
                  allow_unicode=True,
                  width=1000,
              ).strip()

              path.write_text(f"---\n{new_fm}\n---\n{body}", encoding="utf-8")
              print(f"Updated {path}")
              updated_count += 1

          print(f"Total updated files: {updated_count}")
          PY

      - name: Commit and push status changes
        if: >-
          steps.reviewer.outputs.is_codeowner == 'true' &&
          steps.targets.outputs.count != '0'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No front matter updates to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/*.md
          git commit -m "chore - content: publish reviewed ai article"
          git push
