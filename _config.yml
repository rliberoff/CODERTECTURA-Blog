    icon: "fab fa-fw fa-youtube"
    url: "https://www.youtube.com/@CODERTECTURA"
  - title: "Twitch"
    icon: "fab fa-fw fa-twitch"
    url: "https://www.twitch.tv/codertectura"  
  - title: "LinkedIn"
    icon: "fab fa-fw fa-linkedin"
    url: "https://www.linkedin.com/in/rliberoff/"
  - title: "X (antes Twitter)"
    icon: "fab fa-fw fa-x-twitter"
    url: "https://twitter.com/rliberoff"
  - title: "GitHub"
    icon: "fab fa-fw fa-github"
    url: "https://github.com/rliberoff"