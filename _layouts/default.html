<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}" class="no-js">
    {% include head.html %}

    <body
        class="layout--{{ page.layout | default: layout.layout }}{% if page.classes or layout.classes %}{{ page.classes | default: layout.classes | join: ' ' | prepend: ' ' }}{% endif %} {% if page.entries_layout == 'grid' %}page--wide{% endif %} {{ page.title | slugify }}">
        {% include skip-links.html %} {% include navigation.html %} {% include masthead.html %} {{ content }} {% include footer.html %} {% include cookie-consent.html %} {% include scripts.html %}
    </body>
    {% if page.showBackTop %}
    <a href="#" class="top" title="Volver arriba!" >
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="arrow-down arrow-down-rotate" fill="none">
            <style>
                @keyframes slide-10 {
                    to {
                        transform: translateY(1px);
                    }
                }
            </style>
            <rect width="14" height="14" x="5.523" y="5" stroke="#0f0f0b" stroke-width="1.5" rx="4" style="fill: #c7cdc7" />
            <path
                fill="#202a1a"
                stroke="#202a1a"
                stroke-linecap="round"
                stroke-width=".4"
                d="M15.369 11.258a.429.429 0 10-.549-.659l-2.297 1.915-2.297-1.915a.429.429 0 00-.549.659l2.566 2.138a.425.425 0 00.467.061.425.425 0 00.093-.06l2.566-2.14z"
                style="animation: slide-10 0.7s infinite alternate both cubic-bezier(1, -0.01, 0, 0.98)" />
        </svg>
    </a>
    {% endif %}
</html>
