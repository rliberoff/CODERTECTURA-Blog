    # Azure Files NFS Encryption in Transit for SAP on Azure Systems

    ## In this article

    Azure Files NFS v4.1 volumes support [encryption in-transit](https://aka.ms/nfs/EiT/Announcement)
    via TLS providing enterprise-grade security by encrypting all traffic between
    clients and servers, without compromising performance. With Azure Files NFS, you
    could encrypt your data end-to-end: at rest, in transit, and across the network.

    For more information, refer the following document: [Encryption in transit for
    NFS Azure file shares](../../storage/files/encryption-in-transit-for-nfs-shares).

    ## Deploying Encryption in Transit (EiT) for Azure Files NFS Shares

    For SAP on Azure environment, mount Azure Files NFS shares from within the VM
    with two methods.

    Steps for setting up Azure Files NFS Encryption in Transit for these two scenarios
    are described in this document.

    Important

    For SAP on Azure environments in High Availability(HA) configuration, and file
    system managed by Pacemaker, support for Azure Files NFS Encryption in Transit
    (EiT) is restricted to:

    Refer to [SAP Note 1928533](https://me.sap.com/notes/1928533) for Operating system
    supportability for SAP on Azure systems.

    ## Preparations for Azure Files NFS Encryption in Transit deployment

    Configure an Azure Files storage account, NFS file share, and private endpoint
    as described in [Create an NFS Azure file share](../../storage/files/storage-files-quick-create-use-linux)

    Note

    To enforce Encryption in Transit for all the file shares in the Azure Storage
    account, enable [secure transfer required](../../storage/files/encryption-in-transit-for-nfs-shares#enforce-encryption-in-transit)
    option in the configuration tab of the storage account.

    Deploy the mount helper (AZNFS) package on the Linux VM.

    Follow the AZNFS mount helper package installation steps based on operating system.

    `curl -sSL -O https://packages.microsoft.com/config/$(source /etc/os-release &&
    echo "$ID/${VERSION_ID%%.*}")/packages-microsoft-prod.rpm

    sudo rpm -i packages-microsoft-prod.rpm

    rm packages-microsoft-prod.rpm

    sudo zypper refresh

    sudo zypper install aznfs`

    Choose `No` to autoupdate the package during installation. You can also turn off/on
    autoupdate at any time by changing the value of `AUTO_UPDATE_AZNFS` to false/true
    respectively in the file `/opt/microsoft/aznfs/data/config`.

    `No`

    `AUTO_UPDATE_AZNFS`

    `/opt/microsoft/aznfs/data/config`

    For more information, see the [package installation](../../storage/files/encryption-in-transit-for-nfs-shares#step-1-check-aznfs-mount-helper-package-installation)
    section.

