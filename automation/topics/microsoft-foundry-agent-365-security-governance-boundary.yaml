    # Transition Microsoft Copilot Studio and Microsoft Foundry agent security capabilities
    to Microsoft Agent 365

    Effective July 1, 2026, AI agent security capabilities for Microsoft Copilot Studio
    and Microsoft Foundry agents require a Microsoft Agent 365 license. These capabilities
    are no longer covered by existing Defender for Cloud Apps or Defender for Cloud
    licenses. Tenants without an Agent 365-eligible license lose access to these capabilities
    on July 1, 2026.

    Once you onboard to Agent 365, these experiences remain in the Microsoft Defender
    portal — powered by Agent 365 observability logs and the agent registry as the
    single source of truth for agent inventory, real-time threat protection, and consistent
    posture across your environment.

    The following sections list the capabilities that require an Agent 365 license,
    describe how the experience changes after you transition, and provide step-by-step
    actions to prepare your environment before July 1, 2026.

    ## Capabilities that require a Microsoft Agent 365 license as of July 1, 2026

    These capabilities, currently through Microsoft Defender for Cloud Apps and Microsoft
    Defender for Cloud, will be fully disabled for tenants without an Agent 365-eligible
    license starting July 1, 2026:

    * **Microsoft Copilot Studio agents** — previously supported through Microsoft
    Defender for Cloud Apps:

    + Agent discovery and posture

    + Agent threat detection and real-time protection

    + Investigation of agent activity in Advanced Hunting, powered by Agent 365 observability
    logs

    * **Microsoft Foundry agents** — previously supported through Microsoft Defender
    for Cloud:

    + Discovery and security posture for cloud-hosted agents, including multi-cloud
    (previously available with the Defender Cloud Security Posture Management plan)

    + Threat protection for agents (previously available with the Defender for AI
    Services plan)

    Note

    Defender Cloud Security Posture Management (CSPM) continues to discover Microsoft
    Foundry accounts and projects, but agent-level discovery, posture, and threat
    detection require an Agent 365 license.

