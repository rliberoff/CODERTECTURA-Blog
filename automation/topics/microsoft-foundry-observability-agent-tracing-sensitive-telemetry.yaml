    # Agent tracing overview

    Important

    Items marked (preview) in this article are currently in public preview. This preview
    is provided without a service-level agreement, and we don''t recommend it for
    production workloads. Certain features might not be supported or might have constrained
    capabilities. For more information, see [Supplemental Terms of Use for Microsoft
    Azure Previews](https://azure.microsoft.com/support/legal/preview-supplemental-terms/).

    Note

    Tracing is generally available for prompt and hosted agents. Workflow and external
    agents are in preview.

    Microsoft Foundry provides an observability platform for monitoring and tracing
    AI agents. It captures key details during an agent run, such as inputs, outputs,
    tool usage, retries, latencies, and costs. Understanding the reasoning behind
    your agent''s executions is important for troubleshooting and debugging. However,
    understanding complex agents presents challenges for several reasons:

    * There could be a high number of steps involved in generating a response, making
    it hard to keep track of all of them.

    * The sequence of steps might vary based on user input.

    * The inputs/outputs at each stage might be long and deserve more detailed inspection.

    * Each step of an agent''s runtime might also involve nesting. For example, an
    agent might invoke a tool, which uses another process, which then invokes another
    tool. If you notice strange or incorrect output from a top-level agent run, it
    might be difficult to determine exactly where in the execution the issue was introduced.

    Trace results solve this by allowing you to view the inputs and outputs of each
    primitive involved in a particular agent run, displayed in the order they were
    invoked, making it easy to understand and debug your AI agent''s behavior.

    ## Prerequisites

    To use tracing end-to-end, you need:

    * A Foundry project with tracing enabled. To set it up, see [How to set up tracing
    in Microsoft Foundry](../how-to/trace-agent-setup).

    * Access to the Application Insights resource connected to your project. For background,
    see [Azure Monitor Application Insights](/en-us/azure/azure-monitor/app/app-insights-overview).

    * A Log Analytics reader role to view traces, insights, and visualizations in
    Foundry.

