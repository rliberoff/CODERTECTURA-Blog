    # Visualize traces on Microsoft Foundry Tracing UI

    ## In this article

    [Microsoft Foundry](/en-us/azure/ai-studio/) Tracing UI is a web-based user interface
    that allows you to visualize traces and logs generated by your applications. This
    article provides a step-by-step guide on how to visualize traces on Foundry Tracing
    UI.

    Important

    Before you start, make sure you have completed the tutorial on [inspecting telemetry
    data with Application Insights](telemetry-with-app-insights).

    Prerequisites:

    ## Attach an Application Insights resource to the project

    Go to the Foundry project, select the **Tracing** tab on the left blade, and use
    the drop down to attach the Application Insights resource you created in the previous
    tutorial then click **Connect**.

    ![Attach an Application Insights resource to the project](../../../media/azure-ai-foundry-attach-app-insights.png)

    ![Attach an Application Insights resource to the project](../../../media/azure-ai-foundry-attach-app-insights.png)

    ## Use an AI service of your choice

    All Semantic Kernel [AI connectors](../../ai-services/chat-completion/) emit GenAI
    telemetry data that can be visualized in the Foundry Tracing UI.

    Simply rerun the code from the [inspecting telemetry data with Application Insights](telemetry-with-app-insights)
    tutorial.

    ## Visualize traces on Foundry Tracing UI

    After the script finishes running, head over to the Foundry tracing UI. You will
    see a new trace in the trace UI.

    ![Visualize traces on Foundry Tracing UI](../../../media/azure-ai-foundry-tracing-ui.gif)

    ![Visualize traces on Foundry Tracing UI](../../../media/azure-ai-foundry-tracing-ui.gif)

    Tip

    It may take a few minutes for the traces to show up on the UI.

    ## Next steps

    Now that you have successfully visualize trace data with a Foundry project, you
    can explore more features of Semantic Kernel that can help you monitor and diagnose
    your application:

    [Advanced telemetry with Semantic Kernel](telemetry-advanced)

